<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Fidelity Speaker Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>High-Fidelity Speaker Systems</h1>
            <p class="subtitle">Explore our gallery of high-fidelity speaker systems showcasing premium craftsmanship and design.</p>
        </header>

        <div class="gallery">
            <div class="gallery-item">
                <img src="4C928050-46F5-4354-97EF-6D22CE35EC90.JPG" alt="Speaker system 1">
            </div>
            <div class="gallery-item">
                <img src="D6020316-7AA6-4DEA-9EF4-CCD846CDBDEA.JPG" alt="Speaker system 2">
            </div>
            <div class="gallery-item">
                <img src="IMG_8402.JPG" alt="Speaker system 3">
            </div>
            <div class="gallery-item">
                <img src="IMG_8479.jpeg" alt="Speaker system 4">
            </div>
            <div class="gallery-item">
                <img src="IMG_8480.jpeg" alt="Speaker system 5">
            </div>
            <div class="gallery-item">
                <img src="IMG_8827.jpeg" alt="Speaker system 6">
            </div>
            <div class="gallery-item">
                <img src="IMG_8884.jpeg" alt="Speaker system 7">
            </div>
            <div class="gallery-item">
                <img src="IMG_8889.jpeg" alt="Speaker system 8">
            </div>
            <div class="gallery-item">
                <img src="IMG_9136.jpeg" alt="Speaker system 9">
            </div>
            <div class="gallery-item">
                <img src="IMG_9143.jpeg" alt="Speaker system 10">
            </div>
            <div class="gallery-item">
                <img src="IMG_9292.jpeg" alt="Speaker system 11">
            </div>
            <div class="gallery-item">
                <img src="IMG_9305.jpeg" alt="Speaker system 12">
            </div>
            <div class="gallery-item">
                <img src="IMG_9373.jpeg" alt="Speaker system 13">
            </div>
        </div>
    </div>
</body>
</html>
