<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Listening Room Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>High-Fidelity Speaker Systems</h1>
            <p class="subtitle">Explore our custom 2-Channel listenening room  complete with custom built speakers, subwoofers, and custom tube-rolled valve amplifier.</p>
        </header>

        <div class="gallery">            
            <div class="gallery-item">
                <img src="IMG_0412.jpeg" alt="Listening Room 1">
            </div>
            <div class="gallery-item">
                <img src="IMG_0411.jpeg" alt="Listening Room 2">
            </div>
            <div class="gallery-item">
                <img src="IMG_0413.jpeg" alt="Listening Room 3">
            </div>
            <div class="gallery-item">
                <img src="IMG_0414.jpeg" alt="Listening Room 4">
            </div>
            <div class="gallery-item">
                <img src="IMG_0415.jpeg" alt="Listening Room 5">
            </div>
            <div class="gallery-item">
                <img src="IMG_0416.jpeg" alt="Listening Room 6">
            </div>
            <div class="gallery-item">
                <img src="IMG_0419.jpeg" alt="Listening Room 7">
            </div>            
        </div>
    </div>
</body>
</html>
