<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annandale Custom Theater Install</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item"><img src="IMG_8479.jpeg" alt="Theater Install 1"></div>
        <div class="gallery-item"><img src="IMG_8480.jpeg" alt="Theater Install 2"></div>
        <div class="gallery-item"><img src="IMG_8827.jpeg" alt="Theater Install 3"></div>
        <div class="gallery-item"><img src="IMG_8884.jpeg" alt="Theater Install 4"></div>
        <div class="gallery-item"><img src="IMG_8889.jpeg" alt="Theater Install 5"></div>
        <div class="gallery-item"><img src="IMG_9136.jpeg" alt="Theater Install 6"></div>
        <div class="gallery-item"><img src="IMG_9143.jpeg" alt="Theater Install 7"></div>
        <div class="gallery-item"><img src="IMG_9292.jpeg" alt="Theater Install 8"></div>
        <div class="gallery-item"><img src="IMG_9305.jpeg" alt="Theater Install 9"></div>
        <div class="gallery-item"><img src="IMG_9373.jpeg" alt="Theater Install 10"></div>
    </div>
</body>
</html>
